<!doctype html>
<html><head><meta charset="utf-8"><title>Priority Guardian on iPhone (silver)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;height:100%;background:#E8E8EA;font-family:'Inter',-apple-system,system-ui,sans-serif;color:#000}
  .stage{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px 20px;
    box-sizing:border-box;
    background:
      radial-gradient(130% 90% at 50% 115%, #C0C0C8 0%, transparent 55%),
      radial-gradient(130% 90% at 50% -15%, #FAFAFB 0%, transparent 55%),
      linear-gradient(180deg, #E6E6EA 0%, #D2D2D8 100%);
  }

  /* ------------ iPhone — Natural Titanium (silver) ------------ */
  .device{
    position:relative;
    height: min(calc(100vh - 48px), 800px);
    aspect-ratio: 194 / 400;
    border-radius:54px;
    /* titanium rail — brushed silver with stronger contrast */
    background:
      linear-gradient(160deg,
        #F4F4F7 0%,
        #A8A8AF 20%,
        #E6E6EA 38%,
        #8E8E96 56%,
        #CFCFD4 74%,
        #9A9AA2 92%,
        #BFBFC5 100%);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.95) inset,
      0 -1px 0 rgba(0,0,0,0.18) inset,
      0 60px 100px -30px rgba(20,20,30,0.45),
      0 18px 40px -12px rgba(20,20,30,0.3),
      0 2px 6px rgba(20,20,30,0.18);
    padding:9px;
    box-sizing:border-box;
  }
  /* dark inner lip between rail and glass */
  .device::before{
    content:'';
    position:absolute; inset:7px;
    border-radius:48px;
    background: linear-gradient(180deg,#23232a 0%, #15151a 55%, #1c1c22 100%);
    z-index:1;
  }
  /* vertical brushed-metal grain on the rail */
  .device::after{
    content:'';
    position:absolute; inset:0;
    border-radius:54px;
    background:
      repeating-linear-gradient(90deg,
        rgba(255,255,255,0.06) 0 1px,
        rgba(0,0,0,0.04) 1px 2px);
    mix-blend-mode:overlay;
    pointer-events:none;
    opacity:0.5;
  }

  /* side buttons — silver */
  .btn{position:absolute;background:linear-gradient(90deg,#B8B8BE 0%,#F0F0F3 50%,#B8B8BE 100%);border-radius:1.5px;z-index:3}
  .btn.silencer{left:-2px;top:11%;width:3.5px;height:3%}
  .btn.vup{left:-2px;top:17%;width:3.5px;height:7%}
  .btn.vdn{left:-2px;top:25%;width:3.5px;height:7%}
  .btn.power{right:-2px;top:22%;width:3.5px;height:11%}

  /* screen */
  .screen{
    position:relative;
    z-index:2;
    width:100%; height:100%;
    border-radius:46px;
    background:#FFFFFF;
    overflow:hidden;
  }

  /* dynamic island */
  .island{
    position:absolute;
    top:11px; left:50%; transform:translateX(-50%);
    width:120px; height:34px; border-radius:22px;
    background:#000;
    z-index:10;
    box-shadow: 0 0 0 0.5px rgba(255,255,255,0.04);
  }

  /* status bar — split around the island */
  .statusbar{
    position:absolute;top:0;left:0;right:0;height:54px;z-index:5;
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 32px 0;
    font-weight:600;font-size:15px;color:#000;
    letter-spacing:-0.01em;
  }
  .statusbar .right{display:flex;align-items:center;gap:5px}
  .statusbar svg{display:block;fill:#000}

  /* ---------- ChatGPT iOS chrome ---------- */
  .chat{
    position:absolute;
    top:54px; left:0; right:0; bottom:0;
    background:#FFFFFF;
    display:flex; flex-direction:column;
    font-family:-apple-system,'SF Pro Text','Inter',system-ui,sans-serif;
    color:#0D0D0D;
  }
  /* top nav */
  .chat-nav{
    flex:0 0 auto;
    height:44px;
    display:grid; grid-template-columns:44px 1fr 44px;
    align-items:center;
    padding:0 8px;
    border-bottom:0.5px solid rgba(0,0,0,0.06);
  }
  .chat-nav .left, .chat-nav .right{
    display:flex; align-items:center; justify-content:center;
    width:44px; height:44px;
    color:#0D0D0D;
  }
  .chat-nav .model{
    display:flex; align-items:center; justify-content:center;
    gap:4px;
    font-size:17px; font-weight:600;
    color:#0D0D0D;
  }
  .chat-nav .model .caret{
    color:#8E8E93;
    font-size:11px;
    margin-top:2px;
  }
  /* thread */
  .chat-thread{
    flex:1 1 auto;
    overflow:hidden;
    padding:14px 14px 20px;
    display:flex; flex-direction:column;
    gap:14px;
  }
  .lead-sm{
    font-size:11px;
    color:#6B6B70;
    white-space:nowrap;
  }
  .lead-sm .icon{ width:11px; height:11px; }
  /* user bubble */
  .msg-user{
    align-self:flex-end;
    max-width:78%;
    background:#F4F4F4;
    color:#0D0D0D;
    font-size:15.5px;
    line-height:1.35;
    padding:9px 14px;
    border-radius:20px;
  }
  /* assistant message (no bubble) */
  .msg-asst{
    display:flex; flex-direction:column; gap:10px;
    font-size:15.5px;
    line-height:1.4;
  }
  .msg-asst .lead{
    display:flex; align-items:center; gap:6px;
    color:#0D0D0D;
  }
  .msg-asst .lead .icon{
    width:16px; height:16px; display:inline-flex;
    align-items:center; justify-content:center;
    color:#8E8E93;
  }
  .msg-asst .lead .caret{
    color:#8E8E93; font-size:11px;
  }
  /* dashboard card — the screenshot inside the assistant msg */
  .dash-card{
    border:1px solid rgba(0,0,0,0.08);
    border-radius:14px;
    overflow:hidden;
    background:#FFFFFF;
  }
  .dash-card img{
    display:block;
    width:100%;
    height:auto;
  }
  /* composer */
  .composer{
    flex:0 0 auto;
    padding:20px 14px 40px;
    background:#FFFFFF;
  }
  .composer-bar{
    display:flex; align-items:center; gap:6px;
    background:#F4F4F4;
    border-radius:16px;
    padding:4px 4px 4px 8px;
    min-height:28px;
  }
  .composer-bar .plus{
    width:22px; height:22px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:#0D0D0D;
    flex-shrink:0;
  }
  .composer-bar .placeholder{
    flex:1; color:#8E8E93; font-size:11px;
  }
  .composer-bar .mic, .composer-bar .wave{
    width:22px; height:22px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:#0D0D0D;
    flex-shrink:0;
  }
  .composer-bar .wave{
    background:#0D0D0D; color:#FFFFFF;
  }

  /* home indicator */
  .home{
    position:absolute; bottom:9px; left:50%; transform:translateX(-50%);
    width:130px; height:5px; border-radius:100px;
    background:rgba(0,0,0,0.32);
    z-index:12;
  }
</style></head>
